services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: upcycleconnect
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      DB_DSN: root:root@tcp(mysql:3306)/upcycleconnect?parseTime=true&charset=utf8mb4
      JWT_SECRET: dev_secret_local
    volumes:
      - ./api:/app
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      API_BASE_URL: http://api:8080/api
    volumes:
      - ./frontend:/var/www/html
    depends_on:
      - api

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - mysql

volumes:
  mysql_data_dev: